<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>İletişim | Şevval Mıkçı</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { margin: 0; display: flex; background: #0f172a; color: #f1f5f9; font-family: 'Segoe UI', sans-serif; }
        
        /* Sol Menü */
        .sidebar { width: 280px; height: 100vh; background: #2e1065; padding: 40px 20px; position: fixed; border-right: 2px solid #a78bfa; }
        .sidebar h3 { color: #a78bfa; margin-bottom: 40px; text-align: center; }
        .nav-link { color: #d8b4fe; text-decoration: none; font-size: 1.1rem; display: block; padding: 15px; border-radius: 8px; margin-bottom: 10px; transition: 0.3s; border-bottom: 1px solid rgba(167, 139, 250, 0.2); }
        .nav-link:hover { background: #4c1d95; color: white; }

        /* Sağ İçerik */
        .content { margin-left: 320px; padding: 50px; width: 100%; }
        h2 { color: #a855f7; margin-bottom: 30px; }
        
        .contact-wrapper { display: grid; grid-template-columns: 1fr 1fr; gap: 50px; background: #1e293b; padding: 40px; border-radius: 12px; }
        
        /* Form Tasarımı */
        .form-group { margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: white; box-sizing: border-box; }
        .btn-submit { background: #a855f7; color: white; padding: 12px 30px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        /* İletişim Bilgileri */
        .info-item { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
        .info-item i { font-size: 1.5rem; color: #a855f7; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h3>ŞEVVAL MIKÇI</h3>
        <a href="index.html" class="nav-link">ANASAYFA</a>
        <a href="kimdir.html" class="nav-link">KİMDİR</a>
        <a href="detay.html" class="nav-link">KARİYER GEÇMİŞİ</a>
        <a href="iletisim.html" class="nav-link">İLETİŞİM</a>
    </div>

    <div class="content">
        <h2>BANA ULAŞIN</h2>
        <div class="contact-wrapper">
            <!-- İletişim Formu -->
            <form action="https://formspree.io/f/meeykjnl" method="POST">
                <div class="form-group">
                    <input type="text" name="ad-soyad" placeholder="* Ad Soyad" required>
                </div>
                <div class="form-group">
                    <input type="email" name="email" placeholder="* Email Adresiniz" required>
                </div>
                <div class="form-group">
                    <textarea name="mesaj" rows="5" placeholder="* Mesajınız" required></textarea>
                </div>
                <button type="submit" class="btn-submit">GÖNDER BAKALIM :)</button>
            </form>
            <!-- İletişim Bilgileri -->
            <div>
                <div class="info-item"><i class="fas fa-map-marker-alt"></i><div><strong>ADRES</strong><br>İstanbul, Türkiye</div></div>
                <div class="info-item"><i class="fas fa-phone"></i><div><strong>TELEFON</strong><br>553 682 14 37</div></div>
                <div class="info-item"><i class="fas fa-envelope"></i><div><strong>E-MAIL</strong><br>sevvalmikci@gmail.com</div></div>
            </div>
        </div>
    </div>

</body>
</html>
